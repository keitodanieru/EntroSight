<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EntroSight · PE Malware Classifier{% endblock %}</title>

  <!-- Google Fonts: Playfair Display (serif headings), DM Sans (body), IBM Plex Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Application stylesheet -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- HTMX for dynamic updates -->
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>

  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell">

    <header class="site-header">
      <a class="brand" href="/" aria-label="EntroSight home">
        <svg class="brand__logo" width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <rect x="0.5" y="0.5" width="6" height="6" fill="#2a343c"></rect>
          <rect x="8" y="0.5" width="6" height="6" fill="#3c4750"></rect>
          <rect x="15.5" y="0.5" width="6" height="6" fill="#2a343c"></rect>
          <rect x="0.5" y="8" width="6" height="6" fill="#4a565f"></rect>
          <rect x="8" y="8" width="6" height="6" fill="#e5484d"></rect>
          <rect x="15.5" y="8" width="6" height="6" fill="#2a343c"></rect>
          <rect x="0.5" y="15.5" width="6" height="6" fill="#2a343c"></rect>
          <rect x="8" y="15.5" width="6" height="6" fill="#3c4750"></rect>
          <rect x="15.5" y="15.5" width="6" height="6" fill="#e5484d"></rect>
        </svg>
        <span class="brand__name">EntroSight</span>
        <span class="brand__tag">PE malware classifier</span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <a href="/"
           class="nav-link{% if active_nav == 'scan' %} nav-link--active{% endif %}"
           aria-label="New scan"
           {% if active_nav == 'scan' %}aria-current="page"{% endif %}>Scan</a>
        <a href="/history"
           class="nav-link{% if active_nav == 'history' %} nav-link--active{% endif %}"
           aria-label="Scan history"
           {% if active_nav == 'history' %}aria-current="page"{% endif %}>History</a>
        <span class="status-badge" aria-label="Running locally, offline">
          <span class="status-badge__dot" aria-hidden="true"></span>Local · offline
        </span>
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <span class="site-footer__text">EntroSight · local PE malware analysis · ResNet-50 + MITRE ATT&amp;CK · no data transmitted to third parties</span>
    </footer>

  </div>
</body>
</html>
